<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="/favicon1.jpg">
  <title>Ask About Odemira — Libraries</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <meta property="og:title" content="Chat with Land — Libraries">
  <meta property="og:image" content="https://llibrary-eight.vercel.app/metaimage.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://llibrary-eight.vercel.app/metaimage.png">
</head>

<body>

  <header class="header page-header">
    <a href="/" class="logo">
      <img src="/logo.svg" alt="LandLibrary" class="logo-img">
    </a>
    <div class="header-nav">
      <a href="/">Home</a>
      <a href="/wiki">The Commons</a>
      <a href="/chat" class="active">Chat with Land</a>
      <a href="/create">Create LandBook</a>
      <div class="lang-toggle">
        <button data-lang="en">EN</button>
        <button data-lang="pt">PT</button>
      </div>
    </div>
  </header>

  <div class="page-body">
    <div class="chat-layout">
      <div class="chat-header">
        <h1>Chat with Land</h1>
        <p>Ask anything about the Odemira bioregion</p>
      </div>
      <div id="chat-suggestions" class="chat-suggestions"></div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-input" class="chat-input" placeholder="Ask about water, soil, fire risk, biodiversity..." rows="1"></textarea>
          <button id="chat-send" class="chat-send">&#8593;</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/pages/chat.js"></script>
</body>

</html>
